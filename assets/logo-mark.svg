<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Party Bingo logo</title>
  <desc id="desc">Een speels bingobord met paarse en blauwe vakjes en een groen vak met vinkje.</desc>
  <defs>
    <linearGradient id="outerStroke" x1="88" y1="56" x2="424" y2="456" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7D67F6"/>
      <stop offset="1" stop-color="#4B53C9"/>
    </linearGradient>
    <linearGradient id="violetTile" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#B8A9FF"/>
      <stop offset="1" stop-color="#7763F0"/>
    </linearGradient>
    <linearGradient id="skyTile" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#86D8FF"/>
      <stop offset="1" stop-color="#38A9F1"/>
    </linearGradient>
    <linearGradient id="limeTile" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D2FF43"/>
      <stop offset="1" stop-color="#74D600"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#5D5AC9" flood-opacity="0.16"/>
    </filter>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#6170CB" flood-opacity="0.16"/>
    </filter>
    <filter id="checkShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#2E7800" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="72" y="54" width="368" height="404" rx="72" fill="#fffefc" stroke="url(#outerStroke)" stroke-width="16"/>
  </g>

  <g fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="6">
    <path d="M98 86c52 4 88 8 140 6"/>
    <path d="M274 88c48 -2 80 -2 126 2"/>
  </g>

  <g transform="translate(114 102)">
    <g filter="url(#tileShadow)">
      <rect x="0" y="0" width="90" height="90" rx="22" fill="url(#violetTile)"/>
      <rect x="104" y="0" width="90" height="90" rx="22" fill="url(#violetTile)"/>
      <rect x="208" y="0" width="90" height="90" rx="24" fill="url(#skyTile)"/>

      <rect x="0" y="104" width="90" height="122" rx="22" fill="url(#skyTile)"/>
      <rect x="104" y="94" width="122" height="142" rx="28" fill="url(#limeTile)"/>
      <rect x="240" y="104" width="74" height="110" rx="20" fill="url(#limeTile)" opacity="0.72"/>

      <rect x="0" y="240" width="90" height="116" rx="24" fill="url(#skyTile)"/>
      <rect x="104" y="250" width="90" height="106" rx="18" fill="url(#skyTile)"/>
      <rect x="208" y="240" width="90" height="116" rx="28" fill="url(#violetTile)"/>
    </g>

    <rect x="104" y="94" width="122" height="142" rx="28" fill="none" stroke="#49A800" stroke-width="10"/>
    <path
      d="M145 164l37 37 69 -77"
      fill="none"
      stroke="#ffffff"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="26"
      filter="url(#checkShadow)"
    />
    <path
      d="M145 164l37 37 69 -77"
      fill="none"
      stroke="#ffffff"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="24"
    />
  </g>
</svg>
